<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Boost: {{ title }}</title>
</head>
<body style="margin: 0; padding: 0; background-color: #f3f4f6;">
  <div style="display: none;">{{ preheader }}</div>
  <table role="presentation" style="width: 100%;" cellpadding="0" cellspacing="0">
    <tr>
      <td align="center" style="padding: 48px;">
        <table role="presentation" style="width: 600px; max-width: 100%; background-color: #ffffff; border-radius: 4px;" cellpadding="0" cellspacing="0">
          <tr>
            <td style="padding: 48px; color: #1f2937; font-family: sans-serif;">
              <p>Hello,</p>
              <p style="font-size: 24px; font-weight: 600; color: #000000;">{{ heading }}</p>
              <p>{{ content }}</p>
              <p>
                <a href="{{ cta_url }}" style="display: inline-block; border-radius: 4px; background-color: #35a775; padding: 16px 24px; color: #ffffff; text-decoration: none; font-weight: 600;">{{ cta_label }} &rarr;</a>
              </p>
              <hr style="border: none; border-top: 1px solid #e5e7eb; margin: 32px 0;">
              <p>Thanks,<br>The Boost Team</p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
